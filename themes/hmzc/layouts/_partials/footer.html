<!-- Footer -->
<footer class="w-full border-t border-gray-700 mt-auto">
    <div class=" mx-auto px-4 sm:px-6 py-6">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex md:justify-start justify-center items-center gap-4 text-white w-44 ">
                <h2 class="text-xl font-bold tracking-tight">Hamzah Chaudhry</h2>
            </div>

            <p class="text-sm text-gray-300">© 2026 Hamzah Chaudhry. All Rights Reserved.</p>

            <div class="flex flex-wrap md:justify-end justify-center gap-3 pt-2 w-44">
                {{ if .Site.Params.LinkedinLink }}
                <div class="flex items-center gap-2 text-center">
                    <a aria-label="LinkedIn"
                        class="rounded-full bg-white/10 p-2.5 text-gray-200 hover:text-blue-500 hover:bg-blue-500/20 transition-colors"
                        href="{{ .Site.Params.LinkedinLink }}"
                        target="_blank" rel="noopener noreferrer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="fill-white size-4" role="img"
                            viewBox="0 0 24 24">
                            <title>LinkedIn</title>
                            <path
                                d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z">
                            </path>
                        </svg>
                    </a>
                </div>
                {{ end }}

                {{ if .Site.Params.GithubLink }}
                <div class="flex items-center gap-1 text-center">
                    <a aria-label="GitHub"
                        class="rounded-full bg-white/10 p-2.5 text-gray-200 hover:text-blue-500 hover:bg-blue-500/20 transition-colors"
                        href="{{ .Site.Params.GithubLink }}"
                        target="_blank" rel="noopener noreferrer">
                        <svg viewBox="0 0 16 16" class="size-4 fill-white" color="currentColor">
                            <path fill-rule="evenodd"
                                d="M8 0C3.58.0.0 3.58.0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38.0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95.0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12.0.0.67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15.0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48.0 1.07-.01 1.93-.01 2.2.0.21.15.46.55.38A8.013 8.013.0 0016 8c0-4.42-3.58-8-8-8z">
                            </path>
                        </svg>
                    </a>
                </div>
                {{ end }}

                {{ if .Site.Params.XLink }}
                <div class="flex items-center gap-2 text-center">
                    <a aria-label="X"
                        class="rounded-full bg-white/10 p-2.5 text-gray-200 hover:text-blue-500 hover:bg-blue-500/20 transition-colors"
                        href="{{ .Site.Params.XLink }}"
                        target="_blank" rel="noopener noreferrer">
                        <svg aria-hidden="true" class="size-4" fill="currentColor" viewbox="0 0 24 24">
                            <path
                                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z">
                            </path>
                        </svg>
                    </a>
                </div>
                {{ end }}
            </div>

        </div>
    </div>
</footer>
