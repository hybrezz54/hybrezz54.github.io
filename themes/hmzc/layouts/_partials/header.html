<div class="flex flex-col border-b border-gray-700 p-4">
    <div class="flex justify-between items-center w-full">
        <div class="font-bold text-2xl text-gray-100">
            <a href="/">hamzah chaudhry</a>
        </div>

        <!-- Hamburger Button -->
        <button id="mobile-menu-btn" aria-label="Toggle navigation"
            class="md:hidden text-gray-100 focus:outline-none p-2 rounded hover:bg-gray-800 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
        </button>

        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center gap-6">
            {{ partial "menu.html" (dict "menuID" "main" "page" . "ulClass" "flex justify-between gap-10") }}
            <!-- <a href="/projects"
                class="bg-blue-500 text-white px-3 py-0.5 rounded text-sm font-semibold hover:bg-blue-600 transition-colors">Projects</a> -->
        </div>
    </div>

    <!-- Mobile Menu (Hidden by default) -->
    <div onclick="window.location.href='/projects'" id="mobile-menu"
        class="hidden md:hidden mt-4 flex flex-col gap-4 pb-2">
        {{ partial "menu.html" (dict "menuID" "main" "page" . "ulClass" "flex flex-col gap-4") }}
        <!-- <button
            class="bg-blue-500 text-white px-3 py-2 rounded text-sm font-semibold w-full hover:bg-blue-600 transition-colors">Projects</button> -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('mobile-menu-btn');
            const menu = document.getElementById('mobile-menu');

            if (btn && menu) {
                btn.addEventListener('click', () => {
                    menu.classList.toggle('hidden');
                });
            }
        });
    </script>
</div>
